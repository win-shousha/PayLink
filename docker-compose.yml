version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: paylink_postgres
    environment:
      POSTGRES_USER: paylink
      POSTGRES_PASSWORD: ${DB_PASSWORD:-paylink123}
      POSTGRES_DB: paylink_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - paylink_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U paylink']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (optionnel)
  redis:
    image: redis:7-alpine
    container_name: paylink_redis
    ports:
      - '6379:6379'
    networks:
      - paylink_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: paylink_backend
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: paylink
      DATABASE_PASSWORD: ${DB_PASSWORD:-paylink123}
      DATABASE_NAME: paylink_db
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - paylink_network
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Vue 3 Frontend
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: paylink_frontend
    environment:
      VITE_API_URL: http://localhost:3000/api/v1
    ports:
      - '5173:5173'
    depends_on:
      - backend
    networks:
      - paylink_network
    volumes:
      - ./web:/app
      - /app/node_modules

  # Nginx Reverse Proxy (optionnel)
  nginx:
    image: nginx:alpine
    container_name: paylink_nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - paylink_network

volumes:
  postgres_data:

networks:
  paylink_network:
    driver: bridge
